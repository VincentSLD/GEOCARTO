<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Import EDS vers Supabase</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 700px; margin: 60px auto; padding: 20px; background: #f5f5f0; }
  h1 { font-size: 1.3rem; }
  .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 16px; }
  label { font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 6px; }
  input[type=password] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-family: monospace; font-size: 0.8rem; box-sizing: border-box; margin-bottom: 12px; }
  button { padding: 10px 24px; border: none; border-radius: 8px; background: #1a1a1a; color: #f5c518; font-weight: 700; font-size: 0.9rem; cursor: pointer; margin-right: 8px; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .tabs { display: flex; gap: 0; margin-bottom: 16px; }
  .tab { padding: 10px 20px; border: 1px solid #ccc; background: #f0f0f0; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
  .tab:first-child { border-radius: 8px 0 0 8px; }
  .tab:last-child { border-radius: 0 8px 8px 0; }
  .tab.active { background: #1a1a1a; color: #f5c518; border-color: #1a1a1a; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  #log { background: #1a1a1a; color: #e0e0e0; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 0.75rem; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
  table { border-collapse: collapse; width: 100%; font-size: 0.75rem; margin-top: 12px; }
  th, td { border: 1px solid #ddd; padding: 4px 8px; text-align: left; }
  th { background: #f5f5f0; font-weight: 700; }
  tr:nth-child(even) { background: #fafafa; }
  .preview { max-height: 500px; overflow-y: auto; margin-top: 12px; }
</style>
</head>
<body>
<h1>Import EDS &rarr; Supabase</h1>

<div class="card">
  <label>Supabase Service Role Key</label>
  <input type="password" id="service-key" placeholder="eyJhbGciOiJIUzI1NiIs...">
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('csv')">CSV</div>
  <div class="tab" onclick="switchTab('kmz')">KMZ / KML</div>
</div>

<div id="panel-csv" class="tab-panel active">
  <div class="card">
    <label>Fichier CSV (séparateur ;)</label>
    <input type="file" id="csv-file" accept=".csv">
    <p style="font-size:0.72rem;color:#888;margin-top:6px;">Colonnes attendues : Dossier, Référence, Nom, Adresse, Code Postal, Ville, Catégorie, Notes, Latitude, Longitude</p>
    <br>
    <button onclick="previewCSV()">Aperçu</button>
    <button onclick="startImportCSV()">Importer</button>
  </div>
</div>

<div id="panel-kmz" class="tab-panel">
  <div class="card">
    <label>Fichier KMZ ou KML (Google Earth)</label>
    <input type="file" id="kmz-file" accept=".kmz,.kml">
    <div style="margin-top:12px;">
      <label>Dossier (optionnel)</label>
      <input type="text" id="kmz-dossier" placeholder="Ex: Import Google Earth 2024" style="width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;font-size:0.8rem;box-sizing:border-box;margin-bottom:8px;">
      <label>Catégorie par défaut</label>
      <select id="kmz-categorie" style="padding:6px;border:1px solid #ccc;border-radius:6px;font-size:0.8rem;">
        <option value="jaune">Jaune</option>
        <option value="rouge">Rouge</option>
      </select>
    </div>
    <br>
    <button onclick="previewKMZ()">Aperçu</button>
    <button onclick="startImportKMZ()">Importer</button>
  </div>
</div>

<div id="preview-container" class="preview"></div>
<div id="log"></div>

<script>
const SUPABASE_URL = 'https://asuccniyofzvwgooxjah.supabase.co';

function log(msg) {
  const el = document.getElementById('log');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-panel#panel-${tab}`).classList.add('active');
  document.querySelectorAll('.tab')[tab === 'csv' ? 0 : 1].classList.add('active');
  document.getElementById('preview-container').innerHTML = '';
  document.getElementById('log').textContent = '';
}

let _pendingRows = []; // Données prêtes à importer (éditables)

// ====== CSV ======
function parseCSVFile() {
  return new Promise((resolve, reject) => {
    const file = document.getElementById('csv-file').files[0];
    if (!file) { alert('Sélectionnez un fichier CSV'); reject(); return; }
    file.text().then(text => {
      const result = Papa.parse(text, { delimiter: ';', header: true, skipEmptyLines: true });
      const valid = result.data.filter(r => {
        const lat = parseFloat((r.Latitude || '').replace(',', '.'));
        const lng = parseFloat((r.Longitude || '').replace(',', '.'));
        return !isNaN(lat) && !isNaN(lng) && lat !== 0 && lng !== 0;
      });
      const rows = valid.map(r => ({
        dossier: r.Dossier || null,
        reference: r['Référence'] || r['Reference'] || null,
        nom: (r.Nom || '').trim() || 'Sans nom',
        adresse: r.Adresse || null,
        code_postal: r['Code Postal'] || null,
        ville: r.Ville || null,
        categorie: r['Catégorie'] || r['Categorie'] || null,
        notes: r.Notes || r['Description brute'] || null,
        latitude: parseFloat((r.Latitude || '').replace(',', '.')),
        longitude: parseFloat((r.Longitude || '').replace(',', '.')),
        created_by: null
      }));
      resolve(rows);
    });
  });
}

function previewCSV() {
  parseCSVFile().then(rows => { _pendingRows = rows; showPreview(); });
}

async function startImportCSV() {
  if (!_pendingRows.length) { const rows = await parseCSVFile(); _pendingRows = rows; }
  await importRows(_pendingRows);
}

// ====== KMZ / KML ======
async function parseKMZFile() {
  const file = document.getElementById('kmz-file').files[0];
  if (!file) { alert('Sélectionnez un fichier KMZ ou KML'); return []; }

  let kmlText;
  if (file.name.toLowerCase().endsWith('.kmz')) {
    // KMZ = ZIP contenant un KML
    const zip = await JSZip.loadAsync(file);
    const kmlFile = Object.keys(zip.files).find(f => f.toLowerCase().endsWith('.kml'));
    if (!kmlFile) { alert('Aucun fichier KML trouvé dans le KMZ'); return []; }
    kmlText = await zip.files[kmlFile].async('string');
  } else {
    kmlText = await file.text();
  }

  // Parser le KML
  const parser = new DOMParser();
  const doc = parser.parseFromString(kmlText, 'text/xml');
  const placemarks = doc.querySelectorAll('Placemark');

  const dossier = document.getElementById('kmz-dossier').value.trim() || null;
  const categorie = document.getElementById('kmz-categorie').value || 'jaune';

  const rows = [];
  placemarks.forEach(pm => {
    const name = pm.querySelector('name')?.textContent?.trim() || 'Sans nom';
    const desc = pm.querySelector('description')?.textContent?.trim() || '';

    // Coordonnées : peut être dans Point/coordinates ou dans d'autres géométries
    const coordsEl = pm.querySelector('Point coordinates') || pm.querySelector('coordinates');
    if (!coordsEl) return;

    const coordsText = coordsEl.textContent.trim();
    // Format KML : longitude,latitude,altitude
    const parts = coordsText.split(',');
    if (parts.length < 2) return;

    const lng = parseFloat(parts[0]);
    const lat = parseFloat(parts[1]);
    if (isNaN(lat) || isNaN(lng) || lat === 0 || lng === 0) return;

    // Extraire les données étendues (ExtendedData)
    let reference = '', adresse = '', codePostal = '', ville = '';
    pm.querySelectorAll('ExtendedData SimpleData, ExtendedData Data').forEach(d => {
      const fieldName = (d.getAttribute('name') || '').toLowerCase();
      const val = d.textContent?.trim() || '';
      if (fieldName.includes('ref')) reference = val;
      if (fieldName.includes('adresse') || fieldName.includes('address')) adresse = val;
      if (fieldName.includes('postal') || fieldName.includes('cp') || fieldName.includes('zip')) codePostal = val;
      if (fieldName.includes('ville') || fieldName.includes('city') || fieldName.includes('commune')) ville = val;
    });

    // Aussi chercher dans les balises Data/value
    pm.querySelectorAll('ExtendedData Data').forEach(d => {
      const fieldName = (d.getAttribute('name') || '').toLowerCase();
      const val = d.querySelector('value')?.textContent?.trim() || '';
      if (fieldName.includes('ref')) reference = val;
      if (fieldName.includes('adresse') || fieldName.includes('address')) adresse = val;
      if (fieldName.includes('postal') || fieldName.includes('cp') || fieldName.includes('zip')) codePostal = val;
      if (fieldName.includes('ville') || fieldName.includes('city') || fieldName.includes('commune')) ville = val;
    });

    rows.push({
      dossier,
      reference: reference || null,
      nom: name,
      adresse: adresse || null,
      code_postal: codePostal || null,
      ville: ville || null,
      categorie,
      notes: desc || null,
      latitude: lat,
      longitude: lng,
      created_by: null
    });
  });

  return rows;
}

async function previewKMZ() {
  _pendingRows = await parseKMZFile();
  showPreview();
}

async function startImportKMZ() {
  if (!_pendingRows.length) _pendingRows = await parseKMZFile();
  await importRows(_pendingRows);
}

// ====== Commun ======
function showPreview() {
  const container = document.getElementById('preview-container');
  if (!_pendingRows.length) {
    container.innerHTML = '<p style="color:#c62828;font-weight:600;">Aucun point valide trouvé.</p>';
    return;
  }
  let html = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap;">
    <span style="font-weight:700;">${_pendingRows.length} points</span>
    <button onclick="deleteSelected()" style="padding:6px 14px;font-size:0.78rem;background:#c62828;color:#fff;">🗑 Supprimer sélectionnés</button>
    <button onclick="selectAll(true)" style="padding:6px 14px;font-size:0.78rem;">Tout cocher</button>
    <button onclick="selectAll(false)" style="padding:6px 14px;font-size:0.78rem;">Tout décocher</button>
    <input type="text" id="filter-text" placeholder="🔍 Filtrer..." oninput="filterPreview()" style="padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-size:0.78rem;flex:1;min-width:120px;">
  </div>`;
  html += '<table id="preview-table"><thead><tr><th><input type="checkbox" checked onchange="selectAll(this.checked)"></th><th>#</th><th>Nom</th><th>Ville</th><th>Lat</th><th>Lng</th><th>Notes</th><th></th></tr></thead><tbody>';
  _pendingRows.forEach((r, i) => {
    html += `<tr data-idx="${i}">
      <td><input type="checkbox" class="row-check" data-idx="${i}" checked></td>
      <td>${i + 1}</td>
      <td>${(r.nom || '').replace(/</g,'&lt;')}</td>
      <td>${(r.ville || '').replace(/</g,'&lt;')}</td>
      <td>${r.latitude.toFixed(5)}</td>
      <td>${r.longitude.toFixed(5)}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${(r.notes || '').replace(/</g,'&lt;').substring(0, 80)}</td>
      <td><span onclick="deleteRow(${i})" style="cursor:pointer;color:#c62828;font-weight:700;" title="Supprimer cette ligne">✕</span></td>
    </tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

function deleteRow(idx) {
  _pendingRows.splice(idx, 1);
  showPreview();
}

function deleteSelected() {
  const checks = document.querySelectorAll('.row-check');
  const toDelete = new Set();
  checks.forEach(cb => { if (cb.checked) toDelete.add(parseInt(cb.dataset.idx)); });
  if (!toDelete.size) { alert('Aucune ligne sélectionnée'); return; }
  if (!confirm(`Supprimer ${toDelete.size} ligne(s) de l'aperçu ?`)) return;
  _pendingRows = _pendingRows.filter((_, i) => !toDelete.has(i));
  showPreview();
}

function selectAll(checked) {
  document.querySelectorAll('.row-check').forEach(cb => { cb.checked = checked; });
}

function filterPreview() {
  const filter = (document.getElementById('filter-text')?.value || '').toLowerCase();
  document.querySelectorAll('#preview-table tbody tr').forEach(tr => {
    const text = tr.textContent.toLowerCase();
    tr.style.display = text.includes(filter) ? '' : 'none';
  });
}

async function importRows(rows) {
  const serviceKey = document.getElementById('service-key').value.trim();
  if (!serviceKey) { alert('Service Role Key requise'); return; }
  if (!rows.length) { alert('Aucun point à importer'); return; }

  document.getElementById('log').textContent = '';
  const sb = window.supabase.createClient(SUPABASE_URL, serviceKey);

  const BATCH = 500;
  let inserted = 0, errors = 0;

  log(`Import de ${rows.length} points...`);

  for (let start = 0; start < rows.length; start += BATCH) {
    const batch = rows.slice(start, start + BATCH);
    const { error } = await sb.from('geocarto_eds').insert(batch);
    if (error) {
      log(`  ERREUR lot ${start}-${start + batch.length}: ${error.message}`);
      errors++;
    } else {
      inserted += batch.length;
      log(`  ${inserted} / ${rows.length} insérés...`);
    }
  }

  log('\n============================');
  log('Import terminé !');
  log(`  ${inserted} points insérés`);
  if (errors) log(`  ${errors} lots en erreur`);
  log('============================');
}
</script>
</body>
</html>
